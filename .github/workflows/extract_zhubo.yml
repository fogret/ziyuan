name: update_whitelist
on:
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 当前仓库
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 运行脚本，正常生成两个文件
        run: python extract_zhubo.py

      - name: 仅推送 zhubo.txt 到目标仓库
        run: |
          git clone https://${{ secrets.YONU }}@github.com/fogret/sourt.git tmp_repo
          cd tmp_repo
          mkdir -p config
          cp ../zhubo.txt config/whitelist.txt

          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git add config/whitelist.txt
          git commit -m "Auto update whitelist" || exit 0
          git push
