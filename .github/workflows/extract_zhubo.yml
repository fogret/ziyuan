name: Extract Zhubo
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install requests
        run: pip install requests

      - name: Run extract_zhubo.py
        env:
          YONU: ${{ secrets.YONU }}
        run: python extract_zhubo.py

      - name: Commit & Push
        run: |
          git config --local user.name "github-actions"
          git config --local user.email "action@github.com"
          git add zhubo.txt invalid.txt config/whitelist.txt
          git commit -m "Auto update zhubo & invalid & whitelist" || exit 0
          git push
