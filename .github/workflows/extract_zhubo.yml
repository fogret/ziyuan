name: update_whitelist
on:
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout 当前仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装依赖
        run: pip install requests

      - name: 运行脚本生成文件
        run: python extract_zhubo.py

      - name: 提交本仓库文件
        run: |
          git config user.name "github-actions"
          git config user.email "action@github.com"
          git add zhubo.txt invalid.txt
          git commit -m "Update local files" || exit 0
          git push

      - name: 只覆盖 [KEYWORDS] 下方内容
        run: |
          git clone https://${{ secrets.YONU }}@github.com/fogret/sourt.git tmp_repo
          cd tmp_repo

          # 提取到 [KEYWORDS] 为止的头部（保留说明，不动）
          sed '/\[KEYWORDS\]/q' config/whitelist.txt > header.txt

          # 重新生成文件：头部 + 三行空行 + 新IP内容
          cat header.txt > config/whitelist.txt
          echo "" >> config/whitelist.txt
          echo "" >> config/whitelist.txt
          echo "" >> config/whitelist.txt
          cat ../zhubo.txt >> config/whitelist.txt

          git config user.name "github-actions"
          git config user.email "action@github.com"
          git add config/whitelist.txt
          git commit -m "Auto update whitelist" || exit 0
          git push
