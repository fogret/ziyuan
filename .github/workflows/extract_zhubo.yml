name: update_whitelist
on:
  schedule:
    # 每周日 北京时间 20:00 = UTC 时间 12:00，对应 cron：0 12 * * 0
    - cron: "0 12 * * 0"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout 当前仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装依赖
        run: pip install requests

      - name: 运行脚本生成文件
        run: python extract_zhubo.py

      - name: 提交更新到本仓库
        run: |
          git config user.name "github-actions"
          git config user.email "action@github.com"
          git add zhubo.txt invalid.txt
          git commit -m "更新本地文件" || exit 0
          git push

      - name: 更新目标仓库白名单
        run: |
          git clone https://${{ secrets.YONU }}@github.com/fogret/sourt.git tmp_repo
          cd tmp_repo

          # 保留前 19 行（所有说明 + KEYWORDS + 下面三行）
          head -n 19 config/whitelist.txt > header.txt

          # 重写文件：前19行不动 + 更新时间(北京时间) + IP列表
          cat header.txt > config/whitelist.txt
          echo "# 更新时间：$(TZ=Asia/Shanghai date +'%Y-%m-%d %H:%M:%S')" >> config/whitelist.txt
          cat ../zhubo.txt >> config/whitelist.txt

          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git add config/whitelist.txt
          git commit -m "Auto update whitelist" || exit 0
          git push
