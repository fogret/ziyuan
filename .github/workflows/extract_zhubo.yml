name: update_whitelist
on:
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout 当前仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装依赖
        run: pip install requests

      - name: 运行脚本生成文件
        run: python extract_zhubo.py

      - name: 提交本仓库文件更新
        run: |
          git config user.name "github-actions"
          git config user.email "action@github.com"
          git add zhubo.txt invalid.txt
          git commit -m "Update local files" || exit 0
          git push

      - name: 更新目标仓库 whitelist（北京时间+完整格式）
        run: |
          git clone https://${{ secrets.YONU }}@github.com/fogret/sourt.git tmp_repo
          cd tmp_repo

          # 截取原有头部（保留所有注释不动）
          grep -B 100 -A 2 "# This area is the keyword whitelist" config/whitelist.txt > header.txt

          # 写入头部 + 空行 + 北京时间 + IP列表
          cat header.txt > config/whitelist.txt
          echo "" >> config/whitelist.txt
          echo "# 更新时间：$(TZ=Asia/Shanghai date +'%Y-%m-%d %H:%M:%S')" >> config/whitelist.txt
          cat ../zhubo.txt >> config/whitelist.txt

          git config user.name "github-actions"
          git config user.email "action@github.com"
          git add config/whitelist.txt
          git commit -m "Auto update whitelist" || exit 0
          git push
