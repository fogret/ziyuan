name: Run qucuo.py

on:
  workflow_dispatch:

jobs:
  run-qucuo:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install requests

      - name: Run qucuo.py
        run: |
          python3 qucuo.py

      - name: Show output files
        run: |
          echo "===== live.txt 内容预览 ====="
          head -n 20 live.txt || echo "live.txt 未生成"

      - name: Commit and Push live.txt
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git add live.txt
          git commit -m "Auto update live.txt" || echo "No changes"
          git push

      - name: Upload live.txt artifact
        uses: actions/upload-artifact@v4
        with:
          name: live-output
          path: live.txt
