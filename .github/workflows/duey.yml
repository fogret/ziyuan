name: 标准频道名

on:
  workflow_dispatch:

jobs:
  run-duey:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run duey.py (生成 duey.txt)
        run: python3 duey.py

      - name: Commit and Push
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          
          # 强制加一个时间戳，保证一定有变化
          echo "Updated at $(date '+%Y-%m-%d %H:%M:%S')" >> .last_update
          
          git add duey.txt .last_update
          git commit -m "Auto update duey.txt $(date +%Y-%m-%d)" || echo "No change"
          git push
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: duey-output
          path: duey.txt
