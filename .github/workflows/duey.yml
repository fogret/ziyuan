name: 自动分类生成 duey.txt

on:
  workflow_dispatch:
  schedule:
    - cron: "0 21 * * *"   # 每天 21:00 UTC（北京时间 05:00）

jobs:
  run-duey:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -U sentence-transformers
          pip install -U torch --index-url https://download.pytorch.org/whl/cpu

      - name: Run duey.py (生成 duey.txt)
        run: python3 duey.py

      - name: Commit and Push duey.txt
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git add duey.txt
          git commit -m "Auto update duey.txt" || echo "No changes"
          git push

      - name: Upload duey.txt artifact
        uses: actions/upload-artifact@v4
        with:
          name: duey-output
          path: duey.txt
