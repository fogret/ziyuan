name: Run js.py (Active Fork Scanner)

on:
  workflow_dispatch:
  schedule:
    - cron: "0 20 */3 * *"   # 每 6 小时运行一次，可自行调整

jobs:
  run-script:
    runs-on: ubuntu-latest

    env:
      GH_TOKEN: ${{ secrets.GH_TOKEN }}

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: |
        pip install requests

    - name: Run js.py
      run: python3 js.py

    - name: Commit & Push results
      run: |
        git config --global user.email "actions@github.com"
        git config --global user.name "GitHub Actions"
        git add -A
        git commit -m "Auto update active forks subscribe list" || echo "No changes"
        git push
