name: Count Playback URLs
on:
  push:
    branches: [ main ]
  workflow_dispatch:    # 支持手动触发

jobs:
  count-urls:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run count script
        run: python js.py
