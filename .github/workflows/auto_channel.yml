name: AI自动分类频道

on:
  workflow_dispatch:
  push:
  schedule:
    - cron: '0 12 * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Run AI处理
        run: python channel_ai.py

      - name: Git配置
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: 提交更新
        run: |
          ls -l
          git add channels_output.txt channels_output.m3u || true
          git commit -m "AI自动更新频道列表" || echo "无更新，跳过提交"
          git push || echo "推送失败或无变化"
