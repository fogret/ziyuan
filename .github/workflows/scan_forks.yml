name: Update SUBSCRIBE block

on:
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout current repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run scan_forks.py
        run: python scan_forks.py

      - name: Clone target repo
        run: git clone https://github.com/fogret/sourt target_repo

      - name: Replace SUBSCRIBE block (safe mode)
        run: |
          cd target_repo/config

          echo "开始替换 SUBSCRIBE 区域..."

          # 生成新文件
          {
            in_sub=0
            while IFS= read -r line; do
              # 遇到 [SUBSCRIBE]，写入标题 + 新内容
              if [[ "$line" == "[SUBSCRIBE]" ]]; then
                echo "[SUBSCRIBE]"
                cat ../../../subscribe_block.txt
                in_sub=1
                continue
              fi

              # 遇到下一个区域标题，退出 SUBSCRIBE 区域
              if [[ "$line" =~ ^\[.*\]$ ]] && [[ "$line" != "[SUBSCRIBE]" ]]; then
                in_sub=0
              fi

              # 非 SUBSCRIBE 区域的内容原样写入
              if [[ $in_sub -eq 0 ]]; then
                echo "$line"
              fi
            done < subscribe.txt
          } > subscribe.new

          mv subscribe.new subscribe.txt
          echo "SUBSCRIBE 区域替换完成"

      - name: Commit & Push
        run: |
          cd target_repo
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add config/subscribe.txt
          git commit -m "Update SUBSCRIBE block" || echo "No changes"
          git push https://x-access-token:${{ secrets.YONU }}@github.com/fogret/sourt -f
