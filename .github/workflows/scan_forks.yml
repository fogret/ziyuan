name: IPTV 扫描推送

on:
  workflow_dispatch:
  schedule:
    - cron: '0 16 * * 0'  # 周日 UTC16点 = 北京时间 周一 00:00

jobs:
  run-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install requests
        run: pip install requests

      - name: Run script
        run: python scan_forks.py

      - name: Pull latest before push
        run: git pull --rebase

      - name: Commit and push
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add channels.txt channels.m3u process.log || true
          git diff --quiet || git commit -m "Auto update IPTV channels"
          git push
