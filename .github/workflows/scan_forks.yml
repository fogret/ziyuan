name: IPTV 扫描推送

on:
  workflow_dispatch:
  schedule:
    - cron: '0 16 * * 0'

jobs:
  run-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Run scan script
        env:
          YONU: ${{ secrets.YONU }}
        run: python scan_forks.py

      # 关键：先看文件到底在不在
      - name: Check files exist
        run: |
          ls -l
          cat projects.txt || echo "projects.txt 不存在"
          cat urls.txt || echo "urls.txt 不存在"

      - name: Force commit & push
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"

          # 把文件强制更新
          touch projects.txt urls.txt config/subscribe.txt 2>/dev/null || true

          git add projects.txt urls.txt config/subscribe.txt

          # 重点：不管有没有变化，直接提交，不判断
          git commit -m "Auto update list"
          git push
