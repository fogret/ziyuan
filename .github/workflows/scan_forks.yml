name: Update SUBSCRIBE block

on:
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout current repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run scan_forks.py
        run: python scan_forks.py

      - name: Clone target repo
        run: git clone https://github.com/fogret/sourt target_repo

      - name: Replace SUBSCRIBE block
        run: |
          cd target_repo/config

          # 用 awk 精准替换 SUBSCRIBE 区域
          awk '
            BEGIN {in_sub=0}
            
            # 遇到 [SUBSCRIBE]，打印它，然后插入新内容
            /^\[SUBSCRIBE\]/ {
                print "[SUBSCRIBE]"
                while ((getline line < "../../../subscribe_block.txt") > 0) print line
                close("../../../subscribe_block.txt")
                in_sub=1
                next
            }

            # 遇到其他区域标题，退出 SUBSCRIBE 区域
            /^\[/ && $0 !~ /^\[SUBSCRIBE\]/ {
                in_sub=0
            }

            # 非 SUBSCRIBE 区域的内容原样打印
            !in_sub {print}
          ' subscribe.txt > subscribe.new

          mv subscribe.new subscribe.txt

      - name: Commit & Push
        run: |
          cd target_repo
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add config/subscribe.txt
          git commit -m "Update SUBSCRIBE block" || echo "No changes"
          git push https://x-access-token:${{ secrets.YONU }}@github.com/fogret/sourt -f
