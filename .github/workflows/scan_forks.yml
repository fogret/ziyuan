name: IPTV 扫描推送

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'  # 每6小时跑一次

jobs:
  run-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Run scan
        env:
          YONU: ${{ secrets.YONU }}
        run: python scan.py
