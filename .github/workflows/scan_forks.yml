name: Test Write Subscribe

on:
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout current repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run scan_forks.py
        run: python scan_forks.py

      - name: Clone target repo
        run: git clone https://github.com/fogret/sourt target_repo

      - name: Append test content to subscribe.txt
        run: |
          cd target_repo/config

          echo "" >> subscribe.txt
          echo "# ===== 自动测试写入 =====" >> subscribe.txt
          echo "# 时间：$(date '+%Y-%m-%d %H:%M:%S')" >> subscribe.txt
          echo "# 以下是测试写入内容：" >> subscribe.txt
          cat ../../../subscribe_block.txt >> subscribe.txt
          echo "# ===== 测试写入结束 =====" >> subscribe.txt

      - name: Commit & Push
        run: |
          cd target_repo
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add config/subscribe.txt
          git commit -m "Test write subscribe" || echo "No changes"
          git push https://x-access-token:${{ secrets.YONU }}@github.com/fogret/sourt -f
