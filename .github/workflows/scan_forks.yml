name: IPTV 扫描推送

on:
  workflow_dispatch:
  schedule:
    - cron: '0 16 * * *'  # UTC 16:00 = 北京时间 24:00（次日 00:00）

jobs:
  run-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: pip install requests

      - name: 运行扫描脚本
        env:
          YONU: ${{ secrets.YONU }}
        run: python scan_forks.py

      # 👇 这一步专门把生成的文件推回当前仓库
      - name: 提交并推送更新的文件
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add projects.txt urls.txt
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update files from Actions" && git push)
