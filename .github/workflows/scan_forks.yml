name: IPTV 跨仓库推送

on:
  workflow_dispatch:
  schedule:
    - cron: '0 16 * * 0'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Run script
        env:
          YONU: ${{ secrets.YONU }}
        run: python scan_forks.py
