name: IPTV 扫描推送

on:
  workflow_dispatch:  # 支持手动触发
  schedule:
    - cron: '0 */6 * * *'  # 每6小时自动运行一次

jobs:
  run-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: pip install requests

      - name: 运行扫描脚本
        env:
          YONU: ${{ secrets.YONU }}  # 你的 GitHub Token
        run: python scan_forks.py
