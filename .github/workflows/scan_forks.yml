name: Run scan_forks

on:
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout current repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run scan_forks.py
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scan_forks.py

      - name: Clone target repo
        run: git clone https://github.com/fogret/sourt target_repo

      - name: Debug YONU
        run: |
          if [ -z "${{ secrets.YONU }}" ]; then
            echo "YONU is EMPTY"
          else
            echo "YONU length: ${#YONU}"
          fi
        env:
          YONU: ${{ secrets.YONU }}

      - name: Commit & Push
        run: |
          cd target_repo
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add .
          git commit -m "Auto update" || echo "No changes"
          git push https://x-access-token:${{ secrets.YONU }}@github.com/fogret/sourt -f
